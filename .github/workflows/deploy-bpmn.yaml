name: 'Deploy updated BPMNs to Zeebe'
on:
  push:
    paths:
      - 'src/main/resources/*.bpmn'
      - 'src/main/resources/*.dmn'

jobs:
  prepare-files:
    runs-on: ubuntu-latest
    outputs:
      matrix-added: ${{ steps.set-matrix.outputs.added }}
      matrix-modified: ${{ steps.set-matrix.outputs.modified }}
      has-added: ${{ steps.file-changes.outputs.any_added }}
      has-modified: ${{ steps.file-changes.outputs.any_modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: file-changes
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/main/resources/*.bpmn
            src/main/resources/*.dmn

      - name: Build matrix JSON
        id: set-matrix
        run: |
          # Convertit la liste espace-séparée en JSON array propre
          added=$(echo '${{ steps.file-changes.outputs.added_files }}' | tr ' ' '\n' | jq -R . | jq -sc .)
          modified=$(echo '${{ steps.file-changes.outputs.modified_files }}' | tr ' ' '\n' | jq -R . | jq -sc .)
          echo "added=$added" >> $GITHUB_OUTPUT
          echo "modified=$modified" >> $GITHUB_OUTPUT

  deploy-modified-files:
    if: ${{ needs.prepare-files.outputs.has-modified == 'true' }}
    needs: [prepare-files]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJSON(needs.prepare-files.outputs.matrix-modified) }}
    steps:
      - name: Check Out Reference File
        uses: Bhacaz/checkout-files@v2
        with:
          files: ${{ matrix.file }}

      - name: Echo file
        run: echo ${{ matrix.file }}

      - name: Get Bearer Token
        uses: fjogeleit/http-request-action@v1.16.4
        id: zeebeBearer
        with:
          url: 'https://login.cloud.camunda.io/oauth/token'
          method: 'POST'
          customHeaders: '{"Content-Type": "application/x-www-form-urlencoded"}'
          data: 'grant_type=client_credentials&audience=zeebe.camunda.io&client_id=${{ secrets.ZEEBE_CLIENT_ID }}&client_secret=${{ secrets.ZEEBE_CLIENT_SECRET }}'

      - name: Extract Bearer Token
        id: extract-token
        run: echo "token=${{ fromJson(steps.zeebeBearer.outputs.response).access_token }}" >> $GITHUB_OUTPUT

      - name: Deploy to Zeebe
        run: | 
            curl -X POST "https://${{ secrets.CLUSTER_REGION }}.zeebe.camunda.io/${{ secrets.CLUSTER_ID }}/v2/deployments" \
            -H "Authorization: Bearer ${{ steps.extract-token.outputs.token }}" \
            -F "resources=@${{ github.workspace }}/${{ matrix.file }}"

  deploy-new-files:
    if: ${{ needs.prepare-files.outputs.has-added == 'true' }}
    needs: [prepare-files]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJSON(needs.prepare-files.outputs.matrix-added) }}
    steps:
      - name: Check Out Reference File
        uses: Bhacaz/checkout-files@v2
        with:
          files: ${{ matrix.file }}

      - name: Get Bearer Token
        uses: fjogeleit/http-request-action@v1.16.4
        id: zeebeBearer
        with:
          url: 'https://login.cloud.camunda.io/oauth/token'
          method: 'POST'
          customHeaders: '{"Content-Type": "application/x-www-form-urlencoded"}'
          data: 'grant_type=client_credentials&audience=zeebe.camunda.io&client_id=${{ secrets.ZEEBE_CLIENT_ID }}&client_secret=${{ secrets.ZEEBE_CLIENT_SECRET }}'

      - name: Deploy to Zeebe
        run: |
          curl -X POST "https://${{ secrets.CLUSTER_REGION }}.zeebe.camunda.io/${{ secrets.CLUSTER_ID }}/v2/deployments" \
            -H "Authorization: Bearer ${{ fromJson(steps.zeebeBearer.outputs.response).access_token }}" \
            -F "resources=@${{ github.workspace }}/${{ matrix.file }}"